<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="wclassth=device-wclassth, initial-scale=1.0"
    />
    <title>Registration Form</title>

    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
  </head>
  <body class="bg-secondary">
    <main class="mt-3">
      <section>
        <h1 class="text-center">Create Your Account</h1>
        <p class="text-center">Please fill in the details to register</p>
        <form action="" class="container">
          <fieldset class="d-flex flex-column gap-1">
            <legend>Create Account</legend>
            <label for="fullName">Full Name</label>
            <input type="text" name="" pattern="[A-Za-z]*" required />
            <label for="userName">User Name</label>
            <input type="text" name="" class="userName" required />
            <label for="email">Email Address</label>
            <input type="email" name="" class="email" required />
            <label for="password">Password</label>
            <input
              type="password"
              name=""
              class="password"
              minlength="8"
              required
            />
            <label for="confirmPassword">Confirm Password</label>
            <input
              type="password"
              name=""
              class="confirmPassword"
              minlength="8"
              required
            />
            <label for="phoneNumber">Phone Number</label>
            <input
              type="tel"
              name=""
              class="phoneNumber"
              pattern="[0-9]{11}"
              required
            />
            <label for="dob">Date Of Birth</label>
            <input type="date" name="" class="dob" max="2026-07-13" required />
            <label for="gender">Gender</label>
            <select name="" class="gender">
              <option value="Male">Male</option>
              <option value="Female">Female</option>
            </select>
            <div class="checkbox-seciton">
              <input type="checkbox" name="" class="check-me" />
              <label for="check-me"
                >I agree to the <a href="#">Terms and Conditions</a> and
                <a href="#">Privacy Policy</a></label
              >
            </div>
            <button class="btn btn-primary">Register</button>
          </fieldset>
        </form>
        <p class="text-center">Already have an account? <a href="#">Login</a></p>
      </section>
    </main>
  </body>
</html>
