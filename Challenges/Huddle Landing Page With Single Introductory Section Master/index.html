<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!-- displays site properly based on user's device -->

    <link
      rel="icon"
      type="image/png"
      sizes="32x32"
      href="./images/favicon-32x32.png"
    />

    <title>
      Frontend Mentor | Huddle landing page with single introductory section
    </title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css"
    />
    <link rel="stylesheet" href="index.css" />
  </head>
  <body class="bg-customized">
    <div
      class="container-fluid text-white row gy-3"
    >
      <div class="col-6 col-md-4">
        <img src="./images/logo.svg" class="img-fluid" alt="" />
      </div>
      <div class="col-6 col-md-8"></div>
      <div class="col-12 col-sm-6 d-flex align-items-center justify-center">
        <img src="./images/illustration-mockups.svg" alt="" class="img-fluid" />
      </div>
      <div
        class="col-12 col-sm-6 d-flex align-items-center justify-center flex-column align-items-sm-start
        justify-content-sm-start text-sm-start text-center"
      >
        <h2>Build The Community Your Fans Will Love</h2>
        <p>
          Huddle re-imagines the way we build communities. You have a voice, but
          so does your audience. Create connections with your users as you
          engage in genuine discussion.
        </p>
        <button class="btn btn-customized">Register</button>
      </div>
      <div class="d-none d-sm-block col-sm-8"></div>
      <div class="col-12 col-sm-4 mb-4">
        <footer class="d-flex justify-content-center align-items-center gap-3">
          <i class="border rounded-circle p-1 bi bi-instagram"></i
          ><i class="border rounded-circle p-1 bi bi-facebook"></i
          ><i class="border rounded-circle p-1 bi bi-twitter"></i>
        </footer>
      </div>
    </div>
  </body>
</html>
